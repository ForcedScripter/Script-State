appId: com.scriptstate.app
productName: Script State
directories:
  output: release
  buildResources: assets
files:
  - dist/**/*
  - dist-electron/**/*
  - assets/**/*
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icons/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Script State
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: assets/icons/icon.icns
linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: assets/icons
